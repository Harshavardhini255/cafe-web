<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — WakeCup Cafe</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#FFF5F8; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.login-box { background:white; padding:48px; border-radius:20px; box-shadow:0 4px 40px rgba(244,167,187,0.15); width:380px; max-width:90vw; text-align:center; }
.login-box img { width:64px; height:64px; border-radius:50%; margin-bottom:16px; }
.login-box h2 { font-family:'Playfair Display',serif; color:#2D1B2E; margin-bottom:8px; }
.login-box p { font-size:14px; color:#6B5E6B; margin-bottom:24px; }
.login-box input { width:100%; padding:14px 16px; border:2px solid #FCDAE6; border-radius:12px; font-size:15px; outline:none; transition:border 0.3s; font-family:'Inter',sans-serif; }
.login-box input:focus { border-color:#F4A7BB; }
.login-box button { width:100%; padding:14px; background:#F4A7BB; color:white; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.3s; margin-top:16px; font-family:'Inter',sans-serif; }
.login-box button:hover { background:#E27B9A; }
.error { color:#e74c3c; font-size:13px; margin-top:12px; }
</style>
</head>
<body>
<div class="login-box">
  <img src="/static/flow-logo.png" alt="WakeCup">
  <h2>Admin Login</h2>
  <p>WakeCup Cafe || Theni</p>
  <form method="POST" action="/admin/login">
    <input type="password" name="password" placeholder="Enter admin password" required>
    <button type="submit">Login</button>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
  </form>
</div>
</body>
</html>
